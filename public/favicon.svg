<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700');
    </style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="eGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="60%" stop-color="#E8C35A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.25"/>

  <!-- Subtle warm glow -->
  <ellipse cx="256" cy="256" rx="155" ry="175" fill="#C9A84C" opacity="0.09"/>

  <!-- Letter E in Cinzel Bold -->
  <text
    x="256"
    y="340"
    font-family="Cinzel"
    font-weight="700"
    font-size="320"
    text-anchor="middle"
    fill="url(#eGrad)"
  >E</text>

  <!-- Sparkle ✦ top-right -->
  <g transform="translate(430,82)" opacity="0.85">
    <line x1="0" y1="-13" x2="0" y2="13" stroke="#FDE68A" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-13" y1="0" x2="13" y2="0" stroke="#FDE68A" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#FDE68A" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#FDE68A" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- Sparkle ✦ bottom-right -->
  <g transform="translate(442,408)" opacity="0.7">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#FDE68A" stroke-width="3" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#FDE68A" stroke-width="3" stroke-linecap="round"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#FDE68A" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#FDE68A" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Small sparkle top-left -->
  <g transform="translate(68,98)" opacity="0.65">
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Small sparkle bottom-left -->
  <g transform="translate(62,412)" opacity="0.6">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Dot sparkles -->
  <circle cx="452" cy="200" r="4" fill="#FDE68A" opacity="0.5"/>
  <circle cx="458" cy="300" r="3" fill="#A78BFA" opacity="0.45"/>
  <circle cx="60"  cy="235" r="3" fill="#FDE68A" opacity="0.4"/>
  <circle cx="66"  cy="320" r="4" fill="#A78BFA" opacity="0.4"/>
  <circle cx="256" cy="40"  r="4" fill="#FDE68A" opacity="0.35"/>
</svg>