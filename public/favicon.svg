<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="eGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="60%" stop-color="#E8C35A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.25"/>

  <!-- Subtle warm glow behind E -->
  <ellipse cx="258" cy="256" rx="170" ry="195" fill="#C9A84C" opacity="0.08"/>

  <!-- Letter E — geometric, bold, centered -->
  <!-- Path: vertical bar + top/middle/bottom bars -->
  <!-- Bounding box: x 107–405 (298px), y 72–440 (368px) -->
  <path d="M 107,72 H 405 V 124 H 163 V 232 H 369 V 280 H 163 V 388 H 405 V 440 H 107 Z"
        fill="url(#eGrad)"/>

  <!-- Shimmer highlight on top of E -->
  <path d="M 107,72 H 405 V 124 H 163 V 160 H 107 Z
           M 163,232 H 369 V 256 H 163 Z"
        fill="url(#shimmer)"/>

  <!-- Thin inner shadow edge on right side of bars (depth effect) -->
  <line x1="405" y1="124" x2="163" y2="124" stroke="#9A7A2A" stroke-width="2" opacity="0.3"/>
  <line x1="369" y1="280" x2="163" y2="280" stroke="#9A7A2A" stroke-width="2" opacity="0.3"/>
  <line x1="405" y1="388" x2="163" y2="388" stroke="#9A7A2A" stroke-width="2" opacity="0.3"/>

  <!-- Sparkle ✦ top-right -->
  <g transform="translate(422,80)" opacity="0.85">
    <line x1="0" y1="-13" x2="0" y2="13" stroke="#FDE68A" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-13" y1="0" x2="13" y2="0" stroke="#FDE68A" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#FDE68A" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#FDE68A" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- Sparkle ✦ bottom-right -->
  <g transform="translate(436,400)" opacity="0.7">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#FDE68A" stroke-width="3" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#FDE68A" stroke-width="3" stroke-linecap="round"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#FDE68A" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#FDE68A" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Small sparkle top-left -->
  <g transform="translate(68,100)" opacity="0.65">
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Small sparkle bottom-left -->
  <g transform="translate(58,408)" opacity="0.6">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Dot sparkles -->
  <circle cx="448" cy="192" r="4" fill="#FDE68A" opacity="0.5"/>
  <circle cx="455" cy="290" r="3" fill="#A78BFA" opacity="0.45"/>
  <circle cx="64"  cy="230" r="3" fill="#FDE68A" opacity="0.4"/>
  <circle cx="72"  cy="316" r="4" fill="#A78BFA" opacity="0.4"/>
  <circle cx="258" cy="42"  r="4" fill="#FDE68A" opacity="0.35"/>
</svg>